<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Market Research – Market Researcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-role="MarketResearcher">
    <main class="app">
      <section class="card">
        <header class="card__header">
          <h1>Market Research Portal</h1>
          <p class="subtitle">Role-based dashboard</p>
        </header>

        <section class="role">
          <h2 id="role-title"></h2>
          <p id="role-description"></p>
          <div id="role-actions" class="role__actions"></div>
        </section>

        <section id="action-status" class="status status--hidden"></section>

        <section id="result-panel" class="role role--hidden">
          <h2>Output</h2>
          <div id="result-output"></div>
        </section>

        <button id="logout-btn" type="button" class="button button--primary">
          Logout
        </button>
      </section>
    </main>

    <script src="./dashboard.js"></script>
  </body>
</html>
